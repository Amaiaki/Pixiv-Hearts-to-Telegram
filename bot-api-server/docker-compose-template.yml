services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    volumes:
      - ./tg-data:/var/lib/telegram-bot-api
    environment:
      - TELEGRAM_API_ID=your_api_id_here      # 你的 Telegram API ID
      - TELEGRAM_API_HASH=your_api_hash_here  # 你的 Telegram API Hash

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./tg-data:/file
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - 127.0.0.1:8081:80

volumes:
  caddy_data:
  caddy_config:
